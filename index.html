  :root{
    --indigo-900:#10132B; --indigo-800:#161a38; --indigo-700:#1e2447; --indigo-500:#2a3160;
    --washi:#F4EFE6; --washi-2:#efe7d8; --ink:#1c2733; --ink-soft:#5b6b78;
    --red:#FF5A3C; --red-dark:#d63f24; --gold:#E8B84B; --gold-deep:#c9992f;
    --teal:#4DE8D8; --teal-dark:#2bb7ab; --dot:#FF5A3C; --muted:#8898C0;
    --good:#3FA66A; --good-dark:#2e8150; --bad:#D64545; --bad-dark:#a82f2f;
    --line: rgba(77,232,216,.26);
    --quest:"Baloo 2","Segoe UI",system-ui,-apple-system,"Arial Rounded MT Bold",sans-serif;
    --radius:18px; --radius-lg:26px;
    --shadow:0 10px 26px rgba(5,10,25,.45);
    --press:0 4px 0 var(--red-dark);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; min-height:100%;}
  body{
    font-family:var(--quest);
    color:var(--washi); overflow-x:hidden; user-select:none; touch-action:manipulation;
    background:
      radial-gradient(rgba(255,90,60,.5) 1.1px, transparent 1.3px) 0 0/18px 18px,
      radial-gradient(140% 100% at 50% -10%, #1a1f42, var(--indigo-900) 72%);
    background-attachment:fixed;
  }
  canvas.fxlayer{position:fixed; inset:0; pointer-events:none;}
  #bg{z-index:0; opacity:.9;}
  #fx{z-index:70;}

  .app{position:relative; z-index:1; max-width:920px; margin:0 auto; padding:12px 14px 40px; min-height:100vh; display:flex; flex-direction:column;}

  /* Barre du haut */
  .topbar{display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .topbar .spacer{flex:1;}
  .chip{
    border:1px solid var(--line); background:rgba(244,239,230,.94); color:var(--ink); font-weight:700; font-size:15px;
    padding:8px 13px; border-radius:999px; box-shadow:0 4px 12px rgba(5,12,25,.3); cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; min-height:44px; backdrop-filter:blur(3px);
  }
  .chip:active{transform:translateY(2px);}
  .chip.profile-chip{background:var(--red); color:#fff; border-color:var(--red-dark);}

  .screen{display:none; flex:1; flex-direction:column; animation:slidein .32s cubic-bezier(.2,.7,.3,1);}
  .screen.active{display:flex;}
  @keyframes slidein{from{opacity:0; transform:translateY(14px);}to{opacity:1; transform:translateY(0);}}

  h1.title{
    font-size:clamp(28px,6.6vw,46px); margin:10px 0 4px; text-align:center; color:var(--washi);
    font-weight:800; letter-spacing:.5px; text-wrap:balance;
    text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  h1.title .accent{color:var(--gold);}
  .kicker{text-align:center; color:var(--teal); font-weight:800; letter-spacing:3px; font-size:12px; text-transform:uppercase; margin:2px 0;}
  .subtitle{text-align:center; font-size:clamp(15px,3.2vw,19px); margin:2px 0 16px; color:#cdd8e6;}
  .subtitle b{color:var(--gold);}
  .rule{height:3px; width:120px; margin:8px auto 4px; background:linear-gradient(90deg,transparent,var(--red),transparent); border-radius:2px;}

  /* Gros boutons (laque rouge) */
  .big-btn{
    border:none; border-radius:var(--radius); padding:16px 18px; font-size:19px; font-weight:800;
    color:#fff; background:var(--red); box-shadow:var(--press), var(--shadow); cursor:pointer; margin:6px 0;
    display:flex; align-items:center; gap:12px; text-align:start; width:100%; min-height:62px; letter-spacing:.3px;
  }
  .big-btn .emo{font-size:30px; line-height:1;}
  .big-btn:active{transform:translateY(4px); box-shadow:0 0 0 var(--red-dark), var(--shadow);}
  .big-btn.gold{background:var(--gold); color:var(--ink); box-shadow:0 4px 0 var(--gold-deep), var(--shadow);}
  .big-btn.gold:active{box-shadow:0 0 0 var(--gold-deep), var(--shadow);}
  .big-btn.teal{background:var(--teal); color:var(--ink); box-shadow:0 4px 0 var(--teal-dark), var(--shadow);}
  .big-btn.teal:active{box-shadow:0 0 0 var(--teal-dark), var(--shadow);}
  .big-btn.green{background:var(--good); box-shadow:0 4px 0 var(--good-dark), var(--shadow);}
  .big-btn.green:active{box-shadow:0 0 0 var(--good-dark), var(--shadow);}
  .big-btn.ghost{background:var(--washi); color:var(--ink); box-shadow:0 4px 0 #cbc2b1, var(--shadow);}

  .grid{display:grid; gap:12px;}
  .grid.two{grid-template-columns:repeat(2,1fr);}
  .grid.tiles{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}

  /* Tuiles menu (washi + liseré or) */
  .tile{
    background:linear-gradient(180deg,var(--washi),var(--washi-2)); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow); cursor:pointer; color:var(--ink);
    padding:18px 10px; text-align:center; min-height:128px; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  }
  .tile::before{content:""; position:absolute; inset:0; background:
    radial-gradient(circle at 50% -20%, rgba(193,39,45,.10), transparent 60%); pointer-events:none;}
  .tile:active{transform:translateY(4px);}

<body>
<canvas id="bg" class="fxlayer"></canvas>
<canvas id="fx" class="fxlayer"></canvas>
<div id="flash"></div>

<div class="app">
  <!-- BARRE DU HAUT -->
  <div class="topbar">
    <button class="chip" id="backBtn" style="display:none">↩︎ <span data-t="back">חזרה</span></button>
    <div class="spacer"></div>
    <button class="chip profile-chip" id="whoChip" style="display:none"></button>
    <button class="chip" id="soundBtn" title="son">🔊</button>
    <button class="chip" id="langBtn">🇬🇧 EN</button>
  </div>

  <!-- ÉCRAN 1 : PROFILS -->
  <div class="screen" id="scr-profiles">
    <div class="kicker">⛩️ 日本 · JAPAN QUEST</div>
    <h1 class="title"><span data-t="appTitle">הרפתקה ביפן</span></h1>
    <div class="rule"></div>
    <p class="subtitle" data-t="whoPlays">מי משחק?</p>
    <div class="profile-list" id="profileList"></div>
    <p class="hint" data-t="profileHint">כל אחד עם השמירה שלו — ממשיכים בדיוק מאיפה שעצרתם.</p>
    <button class="chip" id="adminBtn" style="margin:14px auto 0">🔧 <span data-t="admin">הורים</span></button>
  </div>

  <!-- ÉCRAN 2 : NOUVEAU PROFIL -->
  <div class="screen" id="scr-new">
    <h1 class="title">✨ <span data-t="newPlayer">שחקן חדש</span></h1>
    <div class="form-card">
      <label data-t="yourName">איך קוראים לך?</label>
      <input type="text" id="newName" maxlength="12" placeholder="...">
      <label data-t="pickAvatar">בחר דמות</label>
      <div class="avatar-row" id="avatarRow"></div>
      <label data-t="yourAge">בן/בת כמה?</label>
      <div class="age-row" id="ageRow"></div>
      <button class="big-btn green" id="createBtn" style="justify-content:center; margin-top:18px;">
        <span class="emo">🚀</span><span data-t="letsGo">קדימה!</span>
      </button>
    </div>
  </div>

  <!-- ÉCRAN 3 : ACCUEIL / CARTE-VOYAGE -->
  <div class="screen" id="scr-home">
    <button class="big-btn" id="navTrip" style="justify-content:center; margin-bottom:2px;"><span class="emo">🗺️</span><span data-t="ourTrip">הטיול שלנו</span></button>
    <div class="grid two" style="margin-bottom:6px;">
      <button class="big-btn gold" id="navFree" style="justify-content:center;"><span class="emo">🎮</span><span data-t="freePlay">משחק חופשי</span></button>
      <button class="big-btn teal" id="navPassport" style="justify-content:center;"><span class="emo">🎴</span><span data-t="passport">דרכון</span></button>
    </div>
    <div class="kicker">🧳 <span data-t="journey">המסע ביפן</span></div>
    <p class="subtitle" id="homeSub"></p>
    <div class="map" id="mapEl"></div>
    <p class="footer-note">🌸 sayōnara · またね 🌸</p>
  </div>

  <!-- ÉCRAN 4 : MENU MODE LIBRE -->
  <div class="screen" id="scr-free">
    <h1 class="title" style="font-size:clamp(24px,6vw,38px)">🎮 <span data-t="chooseGame">בחר משחק</span></h1>
    <div class="rule"></div>
    <div class="grid tiles" id="freeTiles" style="margin-top:10px;"></div>
  </div>

  <!-- ÉCRAN 5 : JEU EN COURS -->
  <div class="screen" id="scr-game">
    <div id="game-area"></div>
  </div>

  <!-- ÉCRAN 6 : PASSEPORT -->
  <div class="screen" id="scr-passport">
    <h1 class="title" style="font-size:clamp(24px,6vw,38px)">🎴 <span data-t="passport">דרכון</span></h1>
    <p class="subtitle" id="passSub"></p>
    <div class="passport-book"><div class="stamp-grid" id="stampGrid"></div></div>
  </div>

  <!-- ÉCRAN 7 : NOTRE VOYAGE (liste des jours) -->
  <div class="screen" id="scr-trip">
    <h1 class="title" style="font-size:clamp(24px,6vw,38px)">🗺️ <span data-t="ourTrip">הטיול שלנו</span></h1>
    <div class="rule"></div>
    <p class="subtitle" id="tripSub"></p>
    <div class="grid two" style="margin:0 0 10px">
      <button class="big-btn gold" id="treasureBtn" style="justify-content:center"><span class="emo">💎</span><span data-t="treasure">אוצר</span></button>
      <button class="big-btn teal" id="shareTripBtn" style="justify-content:center"><span class="emo">📤</span><span data-t="shareTrip">שתף את הטיול</span></button>
    </div>
    <div id="tripDays"></div>
  </div>

  <!-- ÉCRAN 8 : UN JOUR (carnet + quiz du jour) -->
  <div class="screen" id="scr-day">

function frize(o){
  if(Array.isArray(o)){ o.forEach(frize); return; }
  if(o && typeof o==='object'){
    if(typeof o.en==='string' && o.fr===undefined){ o.fr = FR[o.en] || o.en; }
    for(const k in o){ const v=o[k]; if(v && typeof v==='object') frize(v); }
  }
}

  if(!['he','en','fr'].includes(state.lang)) state.lang='he';

}

   ================================================================ */
let audioCtx=null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }
function beep(freq, start, dur, type='sine', vol=0.18){
  if(!state.sound || !audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  const t0=audioCtx.currentTime+start;
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.start(t0); o.stop(t0+dur+0.02);
}
function sfxGood(){ ensureAudio(); beep(660,0,.12,'triangle'); beep(880,.1,.16,'triangle'); }
function sfxBad(){ ensureAudio(); beep(200,0,.22,'sawtooth',.14); }
function sfxWin(){ ensureAudio(); [523,659,784,1046].forEach((f,i)=>beep(f,i*.12,.2,'triangle')); }
function sfxTap(){ ensureAudio(); beep(420,0,.05,'sine',.08); }

let jpVoice=null;
function pickVoice(){ try{ const vs=speechSynthesis.getVoices(); jpVoice = vs.find(v=>/^ja/i.test(v.lang)) || null; }catch(e){} }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speakJP(text){
  if(!state.sound || !('speechSynthesis' in window)) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; if(jpVoice) u.voice=jpVoice; u.rate=.85; u.pitch=1.05; speechSynthesis.speak(u);
  }catch(e){}
}

/* ================================================================
   4b) EFFETS VISUELS : fond animé (pétales) + confettis (canvas)
   ================================================================ */
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const bgCv=document.getElementById('bg'), fxCv=document.getElementById('fx');
const bgX=bgCv.getContext('2d'), fxX=fxCv.getContext('2d');
let petals=[], confetti=[];
const CONF_COLORS=['#E8B84B','#C1272D','#4A90A4','#F4EFE6','#3FA66A'];
function sizeCanvas(){
  [bgCv,fxCv].forEach(cv=>{ cv.width=innerWidth; cv.height=innerHeight; });
  initPetals();
}
function initPetals(){
  petals=[]; if(REDUCED) return;
  const n=0; // design "JAPAN QUEST" : fond à trame de points fixe, pas de pétales
  for(let i=0;i<n;i++) petals.push(newPetal(Math.random()*innerHeight));
}
function newPetal(y){
  return { x:Math.random()*innerWidth, y:(y!=null?y:-20), r:6+Math.random()*8,
    vy:.4+Math.random()*0.8, sway:Math.random()*Math.PI*2, sv:.01+Math.random()*.02,
    col: Math.random()<.5?'#F7C8D6':'#E8B84B', a:.35+Math.random()*.35 };
}
function burst(x,y,n){
  if(REDUCED) return;
  n=n||24;
  for(let i=0;i<n;i++){ const ang=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    confetti.push({ x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp-3, g:.16+Math.random()*.1,
      size:5+Math.random()*7, rot:Math.random()*6, vr:(Math.random()-.5)*.4,
      col:CONF_COLORS[(Math.random()*CONF_COLORS.length)|0], life:60+Math.random()*30 }); }
}
function burstFromEl(el){ if(REDUCED||!el) return; const r=el.getBoundingClientRect(); burst(r.left+r.width/2, r.top+r.height/2, 22); }
function tick(){
  bgX.clearRect(0,0,bgCv.width,bgCv.height);
  if(!REDUCED){
    for(const p of petals){
      p.sway+=p.sv; p.y+=p.vy; p.x+=Math.sin(p.sway)*.6;
      if(p.y>innerHeight+20){ Object.assign(p,newPetal(-20)); }
      bgX.globalAlpha=p.a; bgX.fillStyle=p.col;
      bgX.beginPath(); bgX.ellipse(p.x,p.y,p.r,p.r*.6,p.sway,0,Math.PI*2); bgX.fill();
    }
    bgX.globalAlpha=1;
  }
  fxX.clearRect(0,0,fxCv.width,fxCv.height);
  for(let i=confetti.length-1;i>=0;i--){ const c=confetti[i];
    c.vy+=c.g; c.x+=c.vx; c.y+=c.vy; c.rot+=c.vr; c.life--;
    if(c.life<=0||c.y>innerHeight+30){ confetti.splice(i,1); continue; }
    fxX.save(); fxX.translate(c.x,c.y); fxX.rotate(c.rot); fxX.fillStyle=c.col;
    fxX.fillRect(-c.size/2,-c.size/2,c.size,c.size*.6); fxX.restore();
  }
  requestAnimationFrame(tick);
}
addEventListener('resize', sizeCanvas); sizeCanvas(); tick();

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(a,n){ return shuffle(a).slice(0,n); }

function pool(arr, band, theme){
  let r = arr.filter(x=> x.suit.includes(band) && (!theme || x.theme===theme));
  if(r.length<3) r = arr.filter(x=> x.suit.includes(band)); // repli si trop peu
  if(r.length<3) r = arr.slice();
  return r;
}

/* ================================================================
   MOTEUR DE CHOIX partagé — feedback ✓/✗ + "réessayer avec indice"
   opts: [{lbl,emo} | {emojiBig}]   ci: index correct
   cb(firstTry|correct)   o.mode: 'retry' (défaut) | 'oneshot'
   ================================================================ */
function renderChoices(holder, opts, ci, cb, o){
  o=o||{}; const mode=o.mode||'retry'; const hintAfter=o.hintAfter||2;
  let attempts=0, done=false; const btns=[];
  function setBadge(b,ch){ const bd=b.querySelector('.badge'); if(bd) bd.textContent=ch; }
  function disableAll(){ btns.forEach(bb=>bb.disabled=true); }
  opts.forEach((op,idx)=>{
    const b=document.createElement('button'); b.className='ans';
    let inner = op.emojiBig ? `<span class="emo big">${op.emojiBig}</span>`
      : (op.emo?`<span class="emo">${op.emo}</span>`:'')+(op.lbl?`<span>${op.lbl}</span>`:'');
    b.innerHTML = inner + `<span class="badge"></span>`;
    b.onclick=()=>{
      if(done || b.disabled || b.classList.contains('dim')) return;
      if(idx===ci){
        done=true; b.classList.add('good'); setBadge(b,'✓');
        sfxGood(); burstFromEl(b); flashEdge('good'); reactMascot('good', rand(t('great')));
        disableAll();
        setTimeout(()=> cb(mode==='oneshot' ? true : attempts===0), 900);
      } else if(mode==='oneshot'){
        done=true; b.classList.add('bad'); setBadge(b,'✗'); sfxBad(); flashEdge('bad'); reactMascot('wrong', rand(t('oops')));
        btns[ci].classList.add('good'); setBadge(btns[ci],'✓'); disableAll();
        setTimeout(()=> cb(false), 1050);
      } else {
        attempts++; b.classList.add('bad'); setBadge(b,'✗'); sfxBad(); flashEdge('bad'); reactMascot('wrong', rand(t('oops')));
        b.classList.add('dim'); b.disabled=true;
        if(attempts>=hintAfter){ // indice : on élimine un mauvais choix restant
          const rem=btns.filter((bb,ii)=> ii!==ci && !bb.classList.contains('dim'));
          if(rem.length>1){ rem[0].classList.add('dim'); rem[0].disabled=true; reactMascot('hint', t('hintMsg')); }
        }
      }
    };
    holder.appendChild(b); btns.push(b);
  });
}

      askConfirm(t('resetAsk')+' '+p.name+' ?', ()=>{

}

    checkStamps(res, game);

  });

/* Lance une étape du voyage : enchaîne ses défis */
function startStage(idx){
  const p=activeProfile(); const stg=STAGES[idx]; backAction=openHome;
  let ci=0, starsSum=0;
  const runNext=()=>{
    if(ci>=stg.ch.length){
      const stars = Math.max(1, Math.round(starsSum/stg.ch.length));
      const rec=p.stages[stg.id]||{stars:0};
      const gained = Math.max(0, stars-(rec.stars||0));
      p.stages[stg.id]={done:true, stars:Math.max(stars, rec.stars||0)};
      p.starsTotal=(p.starsTotal||0)+gained; save();
      awardStamp('st_'+stg.id);
      if(STAGES.every(s=>p.stages[s.id]&&p.stages[s.id].done)) awardStamp('champ');
      const allDone = STAGES.every(s=>p.stages[s.id]&&p.stages[s.id].done);
      sfxWin(); burst(innerWidth/2, innerHeight/3, 60);
      bigOverlay(stg.emo, allDone? t('allStages'): t('stageDone'), stars, openHome);
      return;
    }
    const c=stg.ch[ci++];
    runGame({game:c.g, theme:c.t, band:p.band}, (res)=>{
      starsSum += res.stars; checkStamps(res, c.g); runNext();
    });
  };
  runNext();
}

/* Aiguilleur : appelle le bon mini-jeu, renvoie {correct,total,stars} */
function runGame(cfg, done){
  showScreen('scr-game');
  const finish=(correct,total,log)=>{ const stars = total? (correct/total>=.9?3:correct/total>=.6?2:1) : 3;
    finishWithRecap(log, correct, total, ()=> done({correct,total,stars,game:cfg.game})); };
  if(cfg.game==='quiz')   return gameQuiz(cfg, finish);
  if(cfg.game==='memory') return gameMemory(cfg, finish);
  if(cfg.game==='match')  return gameMatch(cfg, finish);
  if(cfg.game==='words')  return gameWords(cfg, finish);
  finish(1,1);
}

/* ---- Bandeau progression ---- */
function progressBar(cur,total){
  return `<div class="progress"><span>${t('question')} ${cur}/${total}</span><div class="bar"><i style="width:${(cur-1)/total*100}%"></i></div></div>`;
}

/* ---- Moteur de questions partagé (feedback + réessai + LOG pour le récap) ----
   list: [{emo, qText, qHTML, sub?, opts:[{lbl,emo}|{emojiBig}], ci, correctLabel, onRender?}]
   finish(firstTryCorrect, total, log) */
function playQuestions(list, finish){
  let i=0, first=0; const log=[]; const area=$('#game-area');
  const step=()=>{
    if(i>=list.length) return finish(first, list.length, log);
    const q=list[i];
    area.innerHTML = mascotBar()+progressBar(i+1,list.length)+
      `<div class="card">${q.emo?`<div class="q-emoji">${q.emo}</div>`:''}<div class="q-text">${q.qHTML}</div>${q.sub||''}</div>
       <div class="answers ${q.opts.length===2?'two':''}" id="ans"></div>`;
    if(q.onRender) q.onRender();
    renderChoices($('#ans'), q.opts, q.ci, (firstTry)=>{
      if(firstTry) first++;
      log.push({emo:q.emo||'❓', q:q.qText, correct:q.correctLabel, ok:firstTry});
      i++; step();
    });
  };
  step();
}

/* ---- Récap fin de partie : liste Q / bonne réponse / ✓-✗ ---- */
function finishWithRecap(log, correct, total, onDone){
  if(log && log.length) renderRecap(log, correct, total, onDone); else onDone();
}
function renderRecap(log, correct, total, onClose){
  showScreen('scr-game');
  const rows=log.map(e=>`<div class="recap-row"><span class="ic">${e.ok?'✅':'❌'}</span>
    <div><div class="rq">${e.emo||''} ${e.q}</div><div class="ra">${t('correctAnswer')}: <b>${e.correct}</b></div></div></div>`).join('');
  $('#game-area').innerHTML = `<div class="card">
      <div class="q-text">📝 ${t('recap')}</div>
      <div class="recap-list">${rows}</div>
      <div style="font-weight:800;color:var(--gold-deep);font-size:22px;margin-top:10px">${correct}/${total} ⭐</div>
      <button class="big-btn green" id="recapNext" style="justify-content:center;margin-top:14px"><span>${t('continue')}</span></button>
    </div>`;
  $('#recapNext').onclick=()=>{ sfxTap(); onClose(); };
}

/* ---- QUIZ (réessayer jusqu'à la bonne réponse, étoiles au 1er essai, récap) ---- */
function quizToItem(q){
  let opts, ci, correctLabel;
  if(q.type==='tf'){ opts=[{lbl:t('trueLbl'),emo:'✅'},{lbl:t('falseLbl'),emo:'❌'}]; ci=q.ans?0:1; correctLabel=q.ans?t('trueLbl'):t('falseLbl'); }
  else { opts=q.options.map(o=>({lbl:txt(o),emo:o.emo})); ci=q.correct; const co=q.options[q.correct]; correctLabel=`${co.emo} ${txt(co)}`.trim(); }
  return {emo:q.emo, qText:txt(q.q), qHTML:txt(q.q), opts, ci, correctLabel};
}
function gameQuiz(cfg, finish){
  const band=cfg.band, count = band==='little'?4:5;
  const qs = sample(pool(QUIZ, band, cfg.theme), count);
  playQuestions(qs.map(quizToItem), finish);
}

/* ---- MEMORY ---- */
function gameMemory(cfg, finish){
  const band=cfg.band;
  const pairs = band==='little'?6 : band==='kid'?6 : band==='big'?8 : 10;
  const chosen = sample(ITEMS, pairs);
  const useJP = false; // Memory = images uniquement (paires d'emojis identiques), sans texte
  let cards=[];
  chosen.forEach((it,idx)=>{
    cards.push({key:idx, kind:'emo', face:it.emo});
    cards.push({key:idx, kind: useJP?'jp':'emo', face: useJP?it.jp:it.emo, rj: useJP?it.romaji:''});
  });
  cards=shuffle(cards);
  const cols = pairs<=6?4 : pairs<=8?4 : 5;
  const area=$('#game-area');
  area.innerHTML = `<div class="progress"><span>🃏 ${t('memory')}</span></div>
    <div class="mem-grid" id="mg" style="grid-template-columns:repeat(${cols},1fr); max-width:${cols*92}px;"></div>`;
  const mg=$('#mg');
  let first=null, lock=false, matched=0, tries=0;
  cards.forEach((c,idx)=>{
    const el=document.createElement('div'); el.className='mem-card';
    el.innerHTML=`<div class="mc mc-back">🌊</div><div class="mc mc-front">${c.face}${c.rj?`<span class="rj">${c.rj}</span>`:''}</div>`;
    el.onclick=()=>{
      if(lock||el.classList.contains('show')||el.classList.contains('matched')) return;
      el.classList.add('show','reveal'); sfxTap();
      if(c.kind==='jp') speakJP(c.face);
      if(!first){ first={el,c}; return; }
      tries++;
      if(first.c.key===c.key){
        el.classList.add('matched'); first.el.classList.add('matched'); matched++;
        sfxGood(); burstFromEl(el); first=null;
        if(matched===pairs){ setTimeout(()=>{ sfxWin(); toast(t('found')); finish(pairs, tries); }, 500); }
      } else {
        lock=true; const a=first.el, b=el;
        setTimeout(()=>{ a.classList.remove('show','reveal'); b.classList.remove('show','reveal'); lock=false; first=null; }, 850);
      }
    };
    mg.appendChild(el);
  });
}

/* ---- MOTS JAPONAIS ----
   Petits : cartes recto/verso à parcourir (toujours réussi).
   Plus grands : petit quiz "que veut dire ce mot ?" (réessayer + indice) */
function gameWords(cfg, finish){
  const band=cfg.band; const p=activeProfile();
  const ws = sample(pool(WORDS, band), band==='little'?5:6);

  } else {
    const list = ws.map(w=>{
      const wrong = sample(WORDS.filter(x=>x!==w), 3);

        onRender:()=>{ learnWord(w); speakJP(w.jp); const hb=$('#hearBtn'); if(hb) hb.onclick=()=>speakJP(w.jp); }
      };
    });
    playQuestions(list, finish);
  }
}

/* ---- ASSOCIE / TROUVE L'INTRUS (réessayer + indice) ---- */
function gameMatch(cfg, finish){
  const band=cfg.band; const count = band==='little'?4:5;
  const mode = cfg.theme || (Math.random()<.5?'assoc':'odd');
  const list=[];
  for(let k=0;k<count;k++){
    if(mode==='assoc'){
      const it=rand(ITEMS); const wrong=sample(ITEMS.filter(x=>x.emo!==it.emo),3);
      const opts=shuffle([it,...wrong]); const ci=opts.indexOf(it);
      list.push({ emo:'', qText:`${t('whichIs')} ${it[state.lang]||it.en}?`,
        qHTML:`${t('whichIs')} <b>${it[state.lang]||it.en}</b>?`,
        opts:opts.map(o=>({emojiBig:o.emo})), ci, correctLabel:`${it.emo} ${it[state.lang]||it.en}` });
    } else {
      const cat=rand(CATS); const other=rand(CATS.filter(c=>c!==cat));
      const good=sample(cat.items,3); const bad=rand(other.items.filter(x=>!good.includes(x)));
      const opts=shuffle([...good.map(e=>({e,odd:false})),{e:bad,odd:true}]);
      const ci=opts.findIndex(o=>o.odd);
      list.push({ emo:'', qText:t('intruder'), qHTML:`🔎 ${t('intruder')}`,
        opts:opts.map(o=>({emojiBig:o.e})), ci, correctLabel:`${bad} (${txt(other)})` });
    }
  }
  playQuestions(list, finish);
}

/* ---- QUIZ DU JOUR : questions générées auto depuis les visites du jour ---- */
function tfVisit(v, wasThere){
  const q=t('didWeGo').replace('{x}', `${v.emo} ${txt(v.name)}`);
  return {emo:v.emo, qText:q, qHTML:q, opts:[{lbl:t('trueLbl'),emo:'✅'},{lbl:t('falseLbl'),emo:'❌'}],
    ci: wasThere?0:1, correctLabel: wasThere?t('trueLbl'):t('falseLbl')};
}
function generateDayQuiz(day){
  const list=[];
  const visits=day.visits.slice();
  const others=[].concat(...state.trip.days.filter(d=>d!==day).map(d=>d.visits));
  const generic=ITEMS.map(it=>({name:{he:it.he,en:it.en},emo:it.emo}));
  const cities=uniqueCities();
  if(cities.length>=2){
    const wrongC=sample(cities.filter(c=>c.name.en!==day.city.en), Math.min(3,cities.length-1));
    const optC=shuffle([{name:day.city,emo:day.emo}, ...wrongC]);
    const ci=optC.findIndex(o=>o.name.en===day.city.en);
    list.push({emo:'📍', qText:t('whichCity'), qHTML:t('whichCity'),
      opts:optC.map(o=>({lbl:txt(o.name), emo:o.emo})), ci, correctLabel:`${day.emo} ${txt(day.city)}`});
  }
  sample(visits, Math.min(2,visits.length)).forEach(v=>{
    let distract=sample(others.filter(o=>o.name.en!==v.name.en), 3);
    if(distract.length<3) distract=distract.concat(sample(generic.filter(g=>g.name.en!==v.name.en), 3-distract.length));
    const opts=shuffle([v,...distract]);
    const ci=opts.findIndex(o=>o.name.en===v.name.en && o.emo===v.emo);
    list.push({emo:'🧠', qText:t('whatVisited'), qHTML:t('whatVisited'),
      opts:opts.map(o=>({lbl:txt(o.name), emo:o.emo})), ci, correctLabel:`${v.emo} ${txt(v.name)}`});
  });
  if(visits.length) list.push(tfVisit(rand(visits), true));
  const decoys=others.concat(generic).filter(o=>!visits.some(v=>v.name.en===o.name.en));
  if(decoys.length) list.push(tfVisit(rand(decoys), false));
  let out=shuffle(list);
  if(out.length<3) out=out.concat(sample(pool(QUIZ,'kid'), 3-out.length).map(quizToItem));
  return out.slice(0,5);
}
function startDayQuiz(day){
  backAction=()=>openDay(day.id); showScreen('scr-game');
  playQuestions(generateDayQuiz(day), (correct,total,log)=>{
    const stars = total? (correct/total>=.9?3:correct/total>=.6?2:1) : 3;
    finishWithRecap(log, correct, total, ()=>{
      day.quizDone=true; const p=activeProfile(); if(p){ p.starsTotal=(p.starsTotal||0)+stars; } save();
      awardStamp('dayquiz'); sfxWin(); burst(innerWidth/2, innerHeight/3, 50);
      bigOverlay('🧠', t('wellDone'), stars, ()=>openDay(day.id));
    });
  });
}

function huntUnlocked(idx){ if(state.trip.unlockAll) return true; if(idx<=0) return true; const prev=state.trip.days[idx-1]; return !!(prev && prev.huntDone); }
function huntQToItem(q){ return {emo:q.emo, qText:txt(q.q), qHTML:txt(q.q), opts:q.opts.map(o=>({lbl:txt(o), emo:o.emo})), ci:q.correct, correctLabel:txt(q.opts[q.correct])}; }
function huntTitleThen(title, cb){
  showScreen('scr-game');

function startHunt(dayIndex){
  const day=state.trip.days[dayIndex]; if(!day||!day.hunt){ toast(t('noVisits')); return; }
  backAction=()=>openDay(day.id);
  const H=day.hunt; const steps=['intro'];
  if(H.recall&&H.recall.length) steps.push('recall');
  if(H.guess&&H.guess.length) steps.push('guess');
  if(H.riddle) steps.push('riddle');
  if(H.challenge) steps.push('challenge');
  steps.push('reward');
  let si=0;
  const next=()=>{ if(si>=steps.length) return; run(steps[si++]); };
  function run(step){
    if(step==='intro'){
      showScreen('scr-game');
      $('#game-area').innerHTML=`<div class="card"><div class="big-emoji">🗺️</div>
        <div class="q-text">${t('chapter')} ${dayIndex+1} · ${txt(day.city)}</div>
        <p class="hint" style="color:var(--ink-soft)">${t('tonightIntro')}</p>
        <button class="big-btn green" id="huntGo" style="justify-content:center;margin-top:12px"><span>${t('startGame')}</span></button></div>`;
      $('#huntGo').onclick=()=>{ sfxTap(); next(); };
    } else if(step==='recall' || step==='guess'){
      const list=(step==='recall'?H.recall:H.guess).map(huntQToItem);
      huntTitleThen(step==='recall'?t('recallTitle'):t('guessTomorrow'),
        ()=> playQuestions(list, (c,tot,log)=> finishWithRecap(log,c,tot,next)) );
    } else if(step==='riddle'){
      const q=H.riddle;
      huntTitleThen(t('riddleTitle'), ()=>{
        showScreen('scr-game');
        $('#game-area').innerHTML=mascotBar()+`<div class="card"><div class="q-emoji">${q.emo||'🧩'}</div><div class="q-text">${txt(q.q)}</div></div><div class="answers" id="ans"></div>`;
        renderChoices($('#ans'), q.opts.map(o=>({lbl:txt(o)})), q.correct, ()=> next());
      });
    } else if(step==='challenge'){
      const c=H.challenge;
      showScreen('scr-game');
      $('#game-area').innerHTML=`<div class="card"><div class="big-emoji">${c.emo||'🎯'}</div>
        <div class="q-text">${t('challengeTitle')}</div>
        <p style="font-size:18px;margin:10px 0;line-height:1.4">${txt(c.text)}</p>
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;margin-top:6px;cursor:pointer"><input type="checkbox" id="chDone" style="width:22px;height:22px"> ${t('challengeTodo')}</label>
        <button class="big-btn green" id="chNext" style="justify-content:center;margin-top:12px"><span>${t('next')}</span></button></div>`;
      const cb=$('#chDone'); cb.checked=!!day.challengeDone; cb.onchange=(e)=>{ day.challengeDone=e.target.checked; save(); };
      $('#chNext').onclick=()=>{ sfxTap(); next(); };
    } else if(step==='reward'){
      day.huntDone=true; save(); awardStamp('chasseur');
      const allDone=state.trip.days.every(d=>d.huntDone);
      sfxWin(); burst(innerWidth/2, innerHeight/3, 55);
      if(allDone){ awardStamp('tresor'); finalTreasure(); return; }
      bigOverlay(day.hunt.piece||'🧩', t('treasurePieceWon'), 0, ()=>openTrip(), null);
    }
  }
  next();
}

    + `<div class="sec-title">${t('treasurePiece')}</div><div class="form-card"><input id="pieceIn" value="${esc(H.piece||'🧩')}" style="width:80px"></div>`
    + `<div class="sec-title">${t('secretMsg')}</div><div class="form-card"><input id="secHe" value="${esc(state.trip.secret.he)}" placeholder="עברית" style="width:100%;margin-bottom:6px"><input id="secEn" value="${esc(state.trip.secret.en)}" placeholder="EN" style="width:100%"></div>`;
  $('#aBack').onclick=()=>{ sfxTap(); adminHunt(); };
  function getArr(sec){ return sec==='recall'?H.recall : sec==='guess'?H.guess : null; }
  function getQ(sec,qi){ return sec==='riddle'? H.riddle : getArr(sec)[qi]; }
  v.oninput=(e)=>{ const el2=e.target;
    if(el2.id==='pieceIn'){ H.piece=el2.value; save(); return; }
    if(el2.id==='secHe'){ state.trip.secret.he=el2.value; save(); return; }
    if(el2.id==='secEn'){ state.trip.secret.en=el2.value; save(); return; }
    if(el2.dataset.ch){ if(el2.dataset.ch==='emo')H.challenge.emo=el2.value; else if(el2.dataset.ch==='he')H.challenge.text.he=el2.value; else H.challenge.text.en=el2.value; save(); return; }
    const sec=el2.dataset.sec; if(sec==null)return; const q=getQ(sec,+el2.dataset.qi); const f=el2.dataset.f;
    if(el2.dataset.oi!=null){ const o=q.opts[+el2.dataset.oi]; if(f==='optHe')o.he=el2.value; else if(f==='optEn')o.en=el2.value; }
    else { if(f==='emo')q.emo=el2.value; else if(f==='qHe')q.q.he=el2.value; else if(f==='qEn')q.q.en=el2.value; }
    save();
  };
  v.onchange=(e)=>{ const el2=e.target; if(el2.dataset.action==='setCorrect'){ getQ(el2.dataset.sec,+el2.dataset.qi).correct=+el2.dataset.oi; save(); } };
  v.onclick=(e)=>{ const a=e.target.closest('[data-action]'); if(!a)return; const act=a.dataset.action, sec=a.dataset.sec;
    if(act==='addQ') getArr(sec).push({emo:'❓',q:{he:'',en:''},opts:[{he:'',en:''},{he:'',en:''}],correct:0});
    else if(act==='delQ') getArr(sec).splice(+a.dataset.qi,1);
    else if(act==='addOpt') getQ(sec,+a.dataset.qi).opts.push({he:'',en:''});
    else if(act==='delOpt'){ const q=getQ(sec,+a.dataset.qi); q.opts.splice(+a.dataset.oi,1); if(q.correct>=q.opts.length)q.correct=0; }
    else return;
    save(); adminHuntDay(di);
  };
}

      <div style="display:flex;gap:8px;margin-top:8px"><button class="chip" data-action="resetP" data-p="${pi}">🔄 ${t('resetPlayer')}</button><button class="chip" data-action="delP" data-p="${pi}" style="color:var(--bad)">🗑️ ${t('del')}</button></div>
    </div>`).join('') || `<p class="hint" style="color:var(--ink-soft)">—</p>`);

    if(el2.dataset.f==='name') p.name=el2.value; else if(el2.dataset.f==='age'){ const a=parseInt(el2.value,10); if(a){ p.age=a; p.band=bandOf(a); } }
    save(); };
  v.onclick=(e)=>{ const a=e.target.closest('[data-action]'); if(!a)return; const pi=+a.dataset.p;
    if(a.dataset.action==='resetP'){ const p=state.profiles[pi]; p.starsTotal=0; p.stages={}; p.stamps=[]; p.words=[]; p.stats={games:0}; save(); adminPlayers(); }
    else if(a.dataset.action==='delP'){ askConfirm(t('resetAsk')+' '+state.profiles[pi].name+' ?', ()=>{ const id=state.profiles[pi].id; state.profiles.splice(pi,1); if(state.activeId===id) state.activeId=null; save(); adminPlayers(); }); }
  };

/* ---- MODE FAMILLE (à tour de rôle, un seul essai — compétitif) ---- */
function startFamily(){
  const players = state.profiles.slice();
  if(players.length<2){ toast({he:'צריך לפחות 2 שחקנים',en:'Need at least 2 players',fr:'Il faut au moins 2 joueurs'}[state.lang]); return; }
  backAction=openFree; showScreen('scr-game');
  const rounds = 3; let turn=0, total=players.length*rounds;
  const scores={}; players.forEach(p=>scores[p.id]=0);
  const area=$('#game-area');
  const intro=()=>{
    area.innerHTML=`<div class="card"><div class="big-emoji" style="font-size:70px">👪</div>
      <div class="q-text">${t('family')}</div><p class="hint" style="color:var(--ink-soft)">${t('familyIntro')}</p>
      <button class="big-btn green" id="go" style="justify-content:center"><span>${t('startGame')}</span></button></div>`;
    $('#go').onclick=()=>{ sfxTap(); step(); };
  };
  const step=()=>{
    if(turn>=total){ return board(); }
    const p=players[turn%players.length];
    const q=sample(pool(QUIZ,p.band),1)[0];
    let opts,ci;
    if(q.type==='tf'){ opts=[{lbl:t('trueLbl'),emo:'✅'},{lbl:t('falseLbl'),emo:'❌'}]; ci=q.ans?0:1; }
    else { opts=q.options.map(o=>({lbl:txt(o),emo:o.emo})); ci=q.correct; }
    area.innerHTML=`<div class="progress"><span>${t('yourTurn')} ${p.avatar} <b>${p.name}</b></span></div>
      <div class="card"><div class="q-emoji">${q.emo}</div><div class="q-text">${txt(q.q)}</div></div>
      <div class="answers ${opts.length===2?'two':''}" id="ans"></div>`;
    renderChoices($('#ans'), opts, ci, (correct)=>{ if(correct){ scores[p.id]++; toast('+1 '+p.name); } turn++; step(); }, {mode:'oneshot'});
  };
  const board=()=>{
    sfxWin(); burst(innerWidth/2, innerHeight/3, 50);
    const ranked=players.slice().sort((a,b)=>scores[b.id]-scores[a.id]);
    const top=scores[ranked[0].id]; const winners=ranked.filter(p=>scores[p.id]===top);
    const rows=ranked.map(p=>`<div style="display:flex;justify-content:space-between;font-size:20px;padding:6px 0"><span>${p.avatar} ${p.name}</span><b>${scores[p.id]} ${t('points')}</b></div>`).join('');
    const head = winners.length>1? t('tie') : t('winner')+' '+winners[0].avatar+' '+winners[0].name;
    area.innerHTML=`<div class="card"><div class="big-emoji" style="font-size:70px">🏆</div>
      <div class="q-text">${head}</div><div style="text-align:start;margin-top:10px">${rows}</div>
      <button class="big-btn gold" id="again" style="justify-content:center;margin-top:14px"><span>${t('tryAgain')}</span></button></div>`;
    $('#again').onclick=()=>{ sfxTap(); startFamily(); };
  };
  intro();
}

/* ---- JAPAN RUN : jeu de plateforme à niveaux (gauche/droite + saut) ---- */
const RUN_LEVELS=[
  { cols:34, gaps:[[9,10],[22,23]],
    plats:[{x:5,y:3,w:3},{x:16,y:4,w:3},{x:26,y:3,w:3}],
    coins:[{x:5,y:2},{x:6,y:2},{x:16,y:3},{x:17,y:3},{x:12,y:5},{x:13,y:5},{x:27,y:2}],
    enemies:[14,28], goalX:32, theme:'city' },
  { cols:40, gaps:[[7,8],[15,16],[27,28]],
    plats:[{x:4,y:4,w:3},{x:12,y:3,w:3},{x:20,y:4,w:4},{x:31,y:3,w:3}],
    coins:[{x:12,y:2},{x:13,y:2},{x:21,y:3},{x:22,y:3},{x:9,y:5},{x:34,y:2},{x:35,y:2}],
    enemies:[11,19,33], goalX:38, theme:'temple' },
  { cols:46, gaps:[[6,7],[13,14],[21,22],[30,31],[38,39]],
    plats:[{x:3,y:4,w:2},{x:10,y:3,w:2},{x:17,y:4,w:3},{x:25,y:3,w:3},{x:34,y:4,w:3},{x:41,y:2,w:3}],
    coins:[{x:10,y:2},{x:17,y:3},{x:25,y:2},{x:26,y:2},{x:34,y:3},{x:41,y:1},{x:42,y:1}],
    enemies:[9,18,27,36], goalX:44, theme:'fuji' },
];
function startRun(level){
  level = level||0;
  backAction=openFree; showScreen('scr-game');
  const cfg=RUN_LEVELS[level];
  const area=$('#game-area');
  area.innerHTML=`<div class="progress"><span>🏃 ${t('run')}</span><span id="runHud" style="margin-inline-start:auto"></span></div>
    <div class="run-wrap"><canvas id="runCv"></canvas>
      <div class="run-controls">
        <div class="side"><button class="run-btn" id="btnL">◀</button><button class="run-btn" id="btnR">▶</button></div>
        <div class="side"><button class="run-btn jump" id="btnJ">⤴</button></div>
      </div>
      <div class="run-hint" id="runHint"><div>${t('runIntro')}</div><div>${t('tapMove')}</div></div>
    </div>`;
  const cv=$('#runCv'), ctx=cv.getContext('2d');
  const cw=cv.parentElement.clientWidth; cv.width=cw; cv.height=Math.round(Math.max(300, Math.min(window.innerHeight*0.6, 480, cw*1.0)));
  const ROWS=7, GROUND=6, TS=Math.floor(cv.height/ROWS);
  const CW=cv.width, CH=cv.height, cols=cfg.cols, worldW=cols*TS, GYpx=GROUND*TS;
  const gapSet=new Set(); (cfg.gaps||[]).forEach(([a,b])=>{for(let x=a;x<=b;x++)gapSet.add(x);});
  function solid(tx,ty){
    if(tx<0) return true;
    if(tx>=cols || ty<0 || ty>GROUND) return false;
    if(ty===GROUND) return !gapSet.has(tx);
    for(const p of (cfg.plats||[])) if(ty===p.y && tx>=p.x && tx<p.x+p.w) return true;
    return false;
  }
  const token={}; currentRunToken=token;
  const pw=Math.round(TS*0.7), ph=Math.round(TS*0.92);
  const spawnX=1*TS, spawnY=GROUND*TS-ph;
  let px=spawnX, py=spawnY, vx=0, vy=0, face=1, jumps=2, invuln=0;
  let lives=3, coins=0, won=false, dead=false, started=false, ended=false;
  const held={L:false,R:false};
  const MOVE=TS*0.12, JUMP=-TS*0.40, G=TS*0.032, EMOVE=TS*0.028;
  let coinList=(cfg.coins||[]).map(c=>({x:c.x*TS+TS/2, y:c.y*TS+TS/2, got:false}));
  let enemies=(cfg.enemies||[]).map(ex=>({x:ex*TS, y:(GROUND-1)*TS, dir:-1, alive:true}));
  const goalPX=cfg.goalX*TS+TS/2, goalPY=(GROUND-1)*TS+TS/2;

  function begin(){ if(!started){ started=true; const h=$('#runHint'); if(h) h.style.display='none'; } }
  function jump(){ begin(); if(dead||won) return; if(jumps>0){ vy=JUMP; jumps--; sfxTap(); } }
  function bindHold(el,code){ if(!el) return;
    const dn=e=>{ e.preventDefault(); begin(); held[code]=true; };
    const up=e=>{ held[code]=false; };
    el.addEventListener('pointerdown',dn); el.addEventListener('pointerup',up);
    el.addEventListener('pointerleave',up); el.addEventListener('pointercancel',up);
  }
  bindHold($('#btnL'),'L'); bindHold($('#btnR'),'R');
  $('#btnJ').addEventListener('pointerdown',e=>{ e.preventDefault(); jump(); });
  function onKey(e){ if(e.code==='ArrowLeft'){ begin(); held.L=true; } else if(e.code==='ArrowRight'){ begin(); held.R=true; } else if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); } }
  function onKeyUp(e){ if(e.code==='ArrowLeft') held.L=false; else if(e.code==='ArrowRight') held.R=false; }
  window.addEventListener('keydown',onKey); window.addEventListener('keyup',onKeyUp);
  function stop(){ window.removeEventListener('keydown',onKey); window.removeEventListener('keyup',onKeyUp); }

  function hurt(){ if(invuln>0||dead||won) return; lives--; invuln=70; sfxBad();
    if(lives<=0){ dead=true; return; } px=spawnX; py=spawnY; vx=0; vy=0; }

  // Décors japonais par niveau
  const THEME={ city:{sky:['#141a3a','#0c1030'],body:'#39405c',top:'#5a6488'},
    temple:{sky:['#3a2a4a','#171233'],body:'#6b4a2b',top:'#8a5a30'},
    fuji:{sky:['#3b5a86','#16224a'],body:'#7d8598',top:'#eaf1fb'} };
  const TH=THEME[cfg.theme]||THEME.city;
  function wrap(x,span){ return ((x%span)+span)%span - span*0.25; }
  function drawSky(){ const g=ctx.createLinearGradient(0,0,0,CH); g.addColorStop(0,TH.sky[0]); g.addColorStop(1,TH.sky[1]);
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH); ctx.textAlign='center'; ctx.textBaseline='middle'; }
  function drawBg(cam){
    const th=cfg.theme;
    if(th==='temple'||th==='fuji'){ ctx.font='22px serif'; ctx.fillText('🌙', CW*0.86-cam*0.1, CH*0.15); }
    if(th==='city'){
      ctx.fillStyle='#1c2348';
      for(let i=0;i<12;i++){ const bx=wrap(i*130-cam*0.4, CW+160); const bh=CH*(0.16+((i*37)%5)*0.05); ctx.fillRect(bx,GYpx-bh,58,bh); }
      ctx.font='30px serif'; ctx.fillText('🗼', wrap(CW*0.55-cam*0.4, CW+260), GYpx-CH*0.24);
      ctx.font='20px serif'; ctx.fillText('🌙', CW*0.85-cam*0.1, CH*0.16);
    } else if(th==='temple'){
      ctx.globalAlpha=0.45; ctx.font=(TS*1.5)+'px serif';
      for(let i=0;i<4;i++) ctx.fillText('⛩️', wrap(i*230-cam*0.35, CW+320), GYpx-CH*0.16);
      ctx.globalAlpha=1; ctx.font='26px serif';
      for(let i=0;i<6;i++) ctx.fillText('🌸', wrap(i*150-cam*0.5, CW+220), CH*0.22+((i*29)%3)*18);
      ctx.font='22px serif';
      for(let i=0;i<5;i++) ctx.fillText('🏮', wrap(i*170-cam*0.6, CW+220), CH*0.12);
    } else {
      ctx.font='26px serif'; ctx.fillText('☁️', wrap(CW*0.3-cam*0.2, CW+220), CH*0.20);
      ctx.fillText('☁️', wrap(CW*0.75-cam*0.15, CW+220), CH*0.12);
      const fx=CW*0.5-cam*0.3;
      ctx.fillStyle='#4a5aa0'; ctx.beginPath(); ctx.moveTo(fx-CW*0.12,GYpx); ctx.lineTo(fx+CW*0.2,GYpx-CH*0.55); ctx.lineTo(fx+CW*0.52,GYpx); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#eef3fc'; ctx.beginPath(); ctx.moveTo(fx+CW*0.10,GYpx-CH*0.36); ctx.lineTo(fx+CW*0.2,GYpx-CH*0.55); ctx.lineTo(fx+CW*0.30,GYpx-CH*0.36); ctx.closePath(); ctx.fill();
    }
  }
  const petalsR=[]; for(let i=0;i<12;i++) petalsR.push({x:Math.random()*CW,y:Math.random()*CH,s:3+Math.random()*4,vy:0.35+Math.random()*0.7,sw:Math.random()*6.28});
  function drawPetals(){ if(REDUCED) return;
    ctx.fillStyle = cfg.theme==='city' ? 'rgba(255,255,255,.45)' : cfg.theme==='fuji' ? 'rgba(255,255,255,.7)' : 'rgba(255,183,210,.85)';
    petalsR.forEach(p=>{ p.sw+=0.02; p.y+=p.vy; p.x+=Math.sin(p.sw)*0.5; if(p.y>CH){ p.y=-6; p.x=Math.random()*CW; }
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.s,p.s*0.6,p.sw,0,6.28); ctx.fill(); }); }

  function loop(){
    if(currentRunToken!==token){ stop(); return; }
    if(!document.getElementById('scr-game').classList.contains('active')){ stop(); return; }
    let ax=0; if(held.L) ax-=1; if(held.R) ax+=1; vx=ax*MOVE; if(ax) face=ax>0?1:-1;
    if(started){
      // horizontal + collision
      px+=vx;
      const top=Math.floor(py/TS), bot=Math.floor((py+ph-1)/TS);
      if(vx>0){ const r=Math.floor((px+pw-1)/TS); for(let ty=top;ty<=bot;ty++) if(solid(r,ty)){ px=r*TS-pw; break; } }
      else if(vx<0){ const l=Math.floor(px/TS); for(let ty=top;ty<=bot;ty++) if(solid(l,ty)){ px=(l+1)*TS; break; } }
      // vertical + collision
      vy+=G; if(vy>TS*0.7) vy=TS*0.7; py+=vy;
      const lft=Math.floor(px/TS), rgt=Math.floor((px+pw-1)/TS);
      if(vy>0){ const b=Math.floor((py+ph-1)/TS); for(let tx=lft;tx<=rgt;tx++) if(solid(tx,b)){ py=b*TS-ph; vy=0; jumps=2; break; } }
      else if(vy<0){ const tp=Math.floor(py/TS); for(let tx=lft;tx<=rgt;tx++) if(solid(tx,tp)){ py=(tp+1)*TS; vy=0; break; } }
      if(py>CH+TS*2) hurt();
    }
    if(invuln>0) invuln--;
    // enemies patrol
    enemies.forEach(en=>{ if(!en.alive||!started) return; en.x+=en.dir*EMOVE;
      const footTx=Math.floor((en.x+(en.dir>0?TS:0))/TS);
      const aheadTx=Math.floor((en.x+(en.dir>0?TS*0.9:TS*0.1))/TS);
      if(!solid(footTx,GROUND) || solid(aheadTx,GROUND-1) || en.x<0 || en.x>worldW-TS) en.dir*=-1;
    });
    let camX=Math.max(0, Math.min(worldW-CW, px-CW*0.35)); if(worldW<CW) camX=0;
    // ---- rendu ----
    drawSky(); drawBg(camX); drawPetals();
    const c0=Math.floor(camX/TS), c1=Math.ceil((camX+CW)/TS);
    for(let tx=c0;tx<=c1;tx++) for(let ty=0;ty<=GROUND;ty++) if(solid(tx,ty)){
      const sx=tx*TS-camX, sy=ty*TS;
      ctx.fillStyle=TH.body; ctx.fillRect(sx,sy,TS+1,TS);
      ctx.fillStyle=TH.top; ctx.fillRect(sx,sy,TS+1,Math.max(4,TS*0.22));
    }
    ctx.font=(TS*1.4)+'px serif'; ctx.fillText('⛩️', goalPX-camX, goalPY-TS*0.2);
    ctx.font=(TS*0.6)+'px serif';
    coinList.forEach(cn=>{ if(cn.got) return; ctx.fillText('🪙', cn.x-camX, cn.y);
      if(Math.abs((px+pw/2)-cn.x)<TS*0.6 && Math.abs((py+ph/2)-cn.y)<TS*0.6){ cn.got=true; coins++; sfxGood(); } });
    ctx.font=(TS*0.8)+'px serif';
    enemies.forEach(en=>{ if(!en.alive) return; ctx.fillText('👺', en.x+TS/2-camX, en.y+TS/2);
      if(!dead && !won){
        const ox=Math.abs((px+pw/2)-(en.x+TS/2)), oyc=Math.abs((py+ph/2)-(en.y+TS/2));
        if(ox<TS*0.55 && oyc<TS*0.6){
          if(vy>0 && (py+ph-en.y)<TS*0.7){ en.alive=false; vy=JUMP*0.55; sfxGood(); }
          else hurt();
        }
      }});
    ctx.save(); ctx.translate(px+pw/2-camX, py+ph/2); ctx.scale(face,1);
    ctx.globalAlpha = invuln>0 ? (Math.floor(invuln/5)%2?0.4:1) : 1;
    ctx.font=(TS*0.85)+'px serif'; ctx.fillText(dead?'💥':'🦊',0,0); ctx.restore(); ctx.globalAlpha=1;
    const hud=$('#runHud'); if(hud) hud.textContent=`${'❤️'.repeat(Math.max(0,lives))} · 🪙${coins} · L${level+1}`;
    if(!won && !dead && Math.abs((px+pw/2)-goalPX)<TS*0.7 && Math.abs((py+ph/2)-goalPY)<TS*1.1) won=true;
    if(dead) return endRun(false);
    if(won) return endRun(true);
    requestAnimationFrame(loop);
  }
  function endRun(success){
    if(ended) return; ended=true; stop();
    const pr=activeProfile();
    if(pr){ pr.stats=pr.stats||{}; pr.stats.runCoins=(pr.stats.runCoins||0)+coins;
      if(success) pr.stats.runLevel=Math.max(pr.stats.runLevel||0, level+1); save(); }
    const last = level+1>=RUN_LEVELS.length;
    if(success && last) awardStamp('runner');
    setTimeout(()=>{
      const ov=document.createElement('div'); ov.className='overlay';
      const title = success ? (last? t('runAllDone') : t('levelDone')) : t('gameOver');
      const nextBtn = (success && !last) ? `<button class="big-btn green" id="rNext" style="justify-content:center"><span>${t('nextLevel')}</span></button>` : '';
      ov.innerHTML=`<div class="box"><div class="big-emoji">${success?(last?'🏆':'🎌'):'🦊'}</div>
        <div class="q-text">${title}</div>
        <div style="font-size:20px;font-weight:800;margin:8px 0">🪙 ${coins}</div>
        <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center">
          ${nextBtn}
          <button class="big-btn gold" id="rAgain" style="justify-content:center"><span>${t('replay')}</span></button>
          <button class="big-btn ghost" id="rClose" style="justify-content:center"><span>${t('continue')}</span></button>
        </div></div>`;
      document.body.appendChild(ov);
      if(success){ sfxWin(); burst(innerWidth/2, innerHeight/3, 40); }
      const nb=$('#rNext'); if(nb) nb.onclick=()=>{ sfxTap(); ov.remove(); startRun(level+1); };
      $('#rAgain').onclick=()=>{ sfxTap(); ov.remove(); startRun(level); };
      $('#rClose').onclick=()=>{ sfxTap(); ov.remove(); openFree(); };
    }, 450);
  }
  requestAnimationFrame(loop);
}

/* ---- SAMURAI QUEST : petite aventure vue de dessus (style Zelda) ---- */
const ZELDA_ROOM=[
 "#############",
 "#P..........#",
 "#..##....##.#",
 "#..........H#",
 "#.E..###..E.#",
 "#...........#",
 "#..##....##.#",
 "#...H..E...C#",
 "#############",
];
function startZelda(){
  backAction=openFree; showScreen('scr-game');
  const R=ZELDA_ROOM, rows=R.length, cols=R[0].length;
  const area=$('#game-area');
  area.innerHTML=`<div class="progress"><span>⚔️ ${t('zelda')}</span><span id="zHud" style="margin-inline-start:auto"></span></div>
    <div class="run-wrap"><canvas id="zCv"></canvas>
      <div class="run-controls">
        <div class="side" style="display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(2,46px);gap:4px">
          <button class="run-btn zbtn" id="zU" style="grid-column:2;grid-row:1">▲</button>
          <button class="run-btn zbtn" id="zL" style="grid-column:1;grid-row:2">◀</button>
          <button class="run-btn zbtn" id="zD" style="grid-column:2;grid-row:2">▼</button>
          <button class="run-btn zbtn" id="zR" style="grid-column:3;grid-row:2">▶</button>
        </div>
        <div class="side"><button class="run-btn jump" id="zA">⚔️</button></div>
      </div>
      <div class="run-hint" id="zHint"><div>${t('zeldaIntro')}</div><div>${t('zeldaCtrl')}</div></div>
    </div>`;
  const cv=$('#zCv'), ctx=cv.getContext('2d');
  const cw=cv.parentElement.clientWidth; const maxH=Math.max(280, Math.min(window.innerHeight*0.58, 460));
  let TS=Math.floor(cw/cols); if(TS*rows>maxH) TS=Math.floor(maxH/rows);
  cv.width=cw; cv.height=TS*rows;
  const offX=Math.floor((cw-TS*cols)/2), offY=0;
  function wall(tx,ty){ if(tx<0||ty<0||tx>=cols||ty>=rows) return true; return R[ty][tx]==='#'; }
  const token={}; currentRunToken=token;
  const ps=Math.round(TS*0.78), es=Math.round(TS*0.7);
  let px=TS, py=TS, enemies=[], hearts=[], chest=null;
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){ const ch=R[y][x];
    if(ch==='P'){ px=x*TS+(TS-ps)/2; py=y*TS+(TS-ps)/2; }
    else if(ch==='E'){ enemies.push({x:x*TS+(TS-es)/2, y:y*TS+(TS-es)/2, alive:true}); }
    else if(ch==='H'){ hearts.push({x:x*TS+TS/2, y:y*TS+TS/2, got:false}); }
    else if(ch==='C'){ chest={x:x*TS+TS/2, y:y*TS+TS/2}; }
  }
  let dir='down', life=5, maxlife=5, invuln=0, atk=0, started=false, won=false, dead=false, ended=false;
  const held={u:false,d:false,l:false,r:false};
  const SP=Math.max(2, TS*0.11), ESP=Math.max(0.8, TS*0.045);

  function begin(){ if(!started){ started=true; const h=$('#zHint'); if(h) h.style.display='none'; } }
  function attack(){ begin(); if(dead||won) return; if(atk<=0){ atk=16; sfxTap();
    let hx=px+ps/2, hy=py+ps/2; const reach=TS*0.9;
    if(dir==='up') hy-=reach; else if(dir==='down') hy+=reach; else if(dir==='left') hx-=reach; else hx+=reach;
    enemies.forEach(en=>{ if(en.alive && Math.abs((en.x+es/2)-hx)<TS*0.75 && Math.abs((en.y+es/2)-hy)<TS*0.75){ en.alive=false; sfxGood(); } });
  } }
  function bindH(el,k){ if(!el) return;
    const dn=e=>{ e.preventDefault(); begin(); held[k]=true; }; const up=e=>{ held[k]=false; };
    el.addEventListener('pointerdown',dn); el.addEventListener('pointerup',up); el.addEventListener('pointerleave',up); el.addEventListener('pointercancel',up);
  }
  bindH($('#zU'),'u'); bindH($('#zD'),'d'); bindH($('#zL'),'l'); bindH($('#zR'),'r');
  $('#zA').addEventListener('pointerdown',e=>{ e.preventDefault(); attack(); });
  function onKey(e){ const k=e.code;
    if(k==='ArrowUp'){ begin(); held.u=true; } else if(k==='ArrowDown'){ begin(); held.d=true; }
    else if(k==='ArrowLeft'){ begin(); held.l=true; } else if(k==='ArrowRight'){ begin(); held.r=true; }
    else if(k==='Space'){ e.preventDefault(); attack(); } }
  function onKeyUp(e){ const k=e.code; if(k==='ArrowUp')held.u=false; else if(k==='ArrowDown')held.d=false; else if(k==='ArrowLeft')held.l=false; else if(k==='ArrowRight')held.r=false; }
  window.addEventListener('keydown',onKey); window.addEventListener('keyup',onKeyUp);
  function stop(){ window.removeEventListener('keydown',onKey); window.removeEventListener('keyup',onKeyUp); }

  function moveEnt(o,size,dx,dy){
    o.x+=dx; let tp=Math.floor(o.y/TS), bt=Math.floor((o.y+size-1)/TS);
    if(dx>0){ const r=Math.floor((o.x+size-1)/TS); for(let ty=tp;ty<=bt;ty++) if(wall(r,ty)){ o.x=r*TS-size; break; } }
    else if(dx<0){ const l=Math.floor(o.x/TS); for(let ty=tp;ty<=bt;ty++) if(wall(l,ty)){ o.x=(l+1)*TS; break; } }
    o.y+=dy; let l=Math.floor(o.x/TS), r=Math.floor((o.x+size-1)/TS);
    if(dy>0){ const b=Math.floor((o.y+size-1)/TS); for(let tx=l;tx<=r;tx++) if(wall(tx,b)){ o.y=b*TS-size; break; } }
    else if(dy<0){ const tp2=Math.floor(o.y/TS); for(let tx=l;tx<=r;tx++) if(wall(tx,tp2)){ o.y=(tp2+1)*TS; break; } }
  }
  function loop(){
    if(currentRunToken!==token){ stop(); return; }
    if(!document.getElementById('scr-game').classList.contains('active')){ stop(); return; }
    let dx=0,dy=0; if(held.l)dx-=1; if(held.r)dx+=1; if(held.u)dy-=1; if(held.d)dy+=1;
    if(dx||dy){ if(Math.abs(dx)>=Math.abs(dy)) dir=dx>0?'right':'left'; else dir=dy>0?'down':'up'; }
    if(started && !dead && !won){ const pl={x:px,y:py}; moveEnt(pl,ps,dx*SP,dy*SP); px=pl.x; py=pl.y; }
    if(atk>0) atk--; if(invuln>0) invuln--;
    const aliveCount=enemies.filter(e=>e.alive).length;
    if(started && !dead && !won) enemies.forEach(en=>{ if(!en.alive) return;
      const vx=(px+ps/2)-(en.x+es/2), vy=(py+ps/2)-(en.y+es/2), d=Math.hypot(vx,vy)||1;
      moveEnt(en,es,(vx/d)*ESP,(vy/d)*ESP);
      if(Math.abs((en.x+es/2)-(px+ps/2))<TS*0.55 && Math.abs((en.y+es/2)-(py+ps/2))<TS*0.55){
        if(invuln<=0){ life--; invuln=70; sfxBad(); if(life<=0) dead=true; } }
    });
    hearts.forEach(h=>{ if(h.got) return; if(Math.abs(h.x-(px+ps/2))<TS*0.6 && Math.abs(h.y-(py+ps/2))<TS*0.6){ h.got=true; if(life<maxlife) life++; sfxGood(); } });
    if(chest && aliveCount===0 && Math.abs(chest.x-(px+ps/2))<TS*0.75 && Math.abs(chest.y-(py+ps/2))<TS*0.75) won=true;
    // ---- rendu ----
    ctx.fillStyle='#20233f'; ctx.fillRect(0,0,cv.width,cv.height);
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){ const sx=offX+x*TS, sy=offY+y*TS;
      if(R[y][x]==='#'){ ctx.fillStyle='#3a2f52'; ctx.fillRect(sx,sy,TS,TS); ctx.fillStyle='#4c3f6b'; ctx.fillRect(sx,sy,TS,4); }
      else { ctx.fillStyle=(x+y)%2?'#2b2e4d':'#262943'; ctx.fillRect(sx,sy,TS,TS); }
    }
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(chest){ ctx.font=(TS*0.8)+'px serif'; ctx.fillText(aliveCount===0?'🎁':'🧰', offX+chest.x, offY+chest.y); }
    ctx.font=(TS*0.6)+'px serif'; hearts.forEach(h=>{ if(!h.got) ctx.fillText('💗', offX+h.x, offY+h.y); });
    ctx.font=(TS*0.7)+'px serif'; enemies.forEach(en=>{ if(en.alive) ctx.fillText('👹', offX+en.x+es/2, offY+en.y+es/2); });
    ctx.save(); ctx.globalAlpha = invuln>0 ? (Math.floor(invuln/5)%2?0.4:1) : 1;
    ctx.font=(TS*0.72)+'px serif'; ctx.fillText(dead?'💥':'🥷', offX+px+ps/2, offY+py+ps/2); ctx.restore();
    if(atk>0){ let sx=px+ps/2, sy=py+ps/2; const rr=TS*0.8;
      if(dir==='up')sy-=rr; else if(dir==='down')sy+=rr; else if(dir==='left')sx-=rr; else sx+=rr;
      ctx.font=(TS*0.6)+'px serif'; ctx.fillText('⚔️', offX+sx, offY+sy); }
    const hud=$('#zHud'); if(hud) hud.textContent = `${'❤️'.repeat(Math.max(0,life))}${'🖤'.repeat(Math.max(0,maxlife-life))} · 👹${aliveCount}`;
    if(dead) return endZelda(false);
    if(won) return endZelda(true);
    requestAnimationFrame(loop);
  }
  function endZelda(success){
    if(ended) return; ended=true; stop();
    if(success){ awardStamp('samurai'); sfxWin(); burst(innerWidth/2, innerHeight/3, 50); }
    setTimeout(()=>{
      const ov=document.createElement('div'); ov.className='overlay';
      ov.innerHTML=`<div class="box"><div class="big-emoji">${success?'🏆':'🥷'}</div>
        <div class="q-text">${success?t('youWin'):t('gameOver')}</div>
        <div style="display:flex;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap">
          <button class="big-btn gold" id="zAgain" style="justify-content:center"><span>${t('replay')}</span></button>
          <button class="big-btn ghost" id="zClose" style="justify-content:center"><span>${t('continue')}</span></button>
        </div></div>`;
      document.body.appendChild(ov);
      $('#zAgain').onclick=()=>{ sfxTap(); ov.remove(); startZelda(); };
      $('#zClose').onclick=()=>{ sfxTap(); ov.remove(); openFree(); };
    }, 450);
  }
  requestAnimationFrame(loop);
}

/* ================================================================
   11) RÉCOMPENSES : overlays + tampons du passeport
   ================================================================ */
function resultOverlay(res, again, back){
  bigOverlay('🎉', t('wellDone'), res.stars, back, again);
}
function bigOverlay(emoji, title, stars, onClose, onAgain){
  const ov=document.createElement('div'); ov.className='overlay';
  const starHtml = stars? `<div class="stars-big">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`:'';
  ov.innerHTML=`<div class="box"><div class="big-emoji">${emoji}</div><div class="q-text">${title}</div>${starHtml}
    <div style="display:flex;gap:10px;margin-top:14px">
      ${onAgain?`<button class="big-btn gold" id="ovAgain" style="justify-content:center"><span>${t('replay')}</span></button>`:''}
      <button class="big-btn green" id="ovClose" style="justify-content:center"><span>${t('continue')}</span></button>
    </div></div>`;
  document.body.appendChild(ov);
  if(!REDUCED) burst(innerWidth/2, innerHeight/2, 40);
  $('#ovClose').onclick=()=>{ sfxTap(); ov.remove(); (onClose||openHome)(); };
  if(onAgain){ $('#ovAgain').onclick=()=>{ sfxTap(); ov.remove(); onAgain(); }; }
}
function awardStamp(id){
  const p=activeProfile(); if(!p) return;
  if(!p.stamps.includes(id)){ p.stamps.push(id); save();
    const s=STAMPS.find(x=>x.id===id); if(s) toast('🎴 '+t('stampsTitle')+' '+s.emo);
  }
}
function checkStamps(res, game){
  const p=activeProfile(); if(!p) return;
  p.stats.games=(p.stats.games||0)+1;
  awardStamp('first');
  if(p.words.length>=10) awardStamp('w10');
  if(p.words.length>=20) awardStamp('w20');
  if(game==='quiz' && res.total>=4 && res.correct===res.total) awardStamp('perfect');
  save();
}

/* ================================================================
   12) PASSEPORT
   ================================================================ */
function openPassport(){
  const p=activeProfile(); backAction=openHome;
  $('#passSub').innerHTML = `🎴 ${p.stamps.length}/${STAMPS.length} ${t('stamps')} · 📚 ${p.words.length} ${t('learnedWords')}`;
  const g=$('#stampGrid'); g.innerHTML='';
  STAMPS.forEach(s=>{ const got=p.stamps.includes(s.id);
    const el=document.createElement('div'); el.className='stamp'+(got?' got':'');
    el.innerHTML=`<div class="ring"><span class="e">${s.emo}</span></div><div class="t">${got?txt(s.t):'???'}</div>`;
    g.appendChild(el);
  });
  showScreen('scr-passport'); applyI18nStatic();
}

/* ================================================================
   13) BARRE DU HAUT : langue, son
   ================================================================ */
$('#langBtn').onclick=()=>{ sfxTap(); state.lang = {he:'en',en:'fr',fr:'he'}[state.lang]||'he'; save(); applyI18nStatic();
  const act=document.querySelector('.screen.active').id;
  if(act==='scr-profiles') renderProfiles(); else if(act==='scr-home') openHome();
  else if(act==='scr-free') openFree(); else if(act==='scr-passport') openPassport();
  else if(act==='scr-new') openNewProfile(); else if(act==='scr-trip') openTrip();
  else if(act==='scr-day' && currentDayId) openDay(currentDayId);
  else if(act==='scr-admin') openAdmin();
};
$('#soundBtn').onclick=()=>{ state.sound=!state.sound; save(); ensureAudio(); if(state.sound) sfxTap(); if(!state.sound){ try{speechSynthesis.cancel();}catch(e){} } applyI18nStatic(); };

/* Débloque l'audio au premier contact (obligatoire sur tablette) */
document.body.addEventListener('pointerdown', ()=>ensureAudio(), {once:true});

load();
applyI18nStatic();
if(state.activeId && activeProfile()){ openHome(); } else { renderProfiles(); }
